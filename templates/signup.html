<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Gayakshari - Sign Up</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #9f225e; text-transform: uppercase; margin-bottom: 25px; }
        form p { text-align: left; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #9f225e; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .login-link { margin-top: 20px; font-size: 14px; color: #666; }
        .login-link a { color: #9f225e; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="logo">GAYAKSHARI</div>
        <p style="color: #666;">Create a new account to explore sarees</p>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Register</button>
        </form>
        
        <div class="login-link">
            ಈಗಾಗಲೇ ಖಾತೆ ಇದೆಯೇ? <a href="{% url 'login' %}">Login Here</a>
        </div>
    </div>
</body>
</html>
